<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latido Examples</title>
  </head>
  <body>
    <main class="showcase">
      <header class="showcase-header">
        <div>
          <p class="eyebrow">Latido Examples</p>
          <h1>One signal engine, multiple demos</h1>
          <p class="subtitle">
            Explore DOM bindings, audio analysis, generic targets, adaptive HMIs, PixiJS, Canvas and Three.js from one page.
          </p>
        </div>
        <nav class="tabs" aria-label="Examples">
          <button class="tab is-active" type="button" data-demo="basic">Basic DOM</button>
          <button class="tab" type="button" data-demo="multi-target">Multi-target</button>
          <button class="tab" type="button" data-demo="adaptive-hmi">Adaptive HMI</button>
        </nav>
      </header>

      <section class="demo-frame-wrap" aria-label="Selected example">
        <iframe
          class="demo-frame"
          title="Latido Basic DOM demo"
          src="./basic.html"
          data-demo-frame
        ></iframe>
      </section>
    </main>

    <script type="module" src="/src/showcase.js"></script>
  </body>
</html>
